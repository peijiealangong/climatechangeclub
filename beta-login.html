<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta Login | Climate Change Club</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="javascript.js" defer></script>
</head>
<body>
    <main class="report-container" style="max-width: 400px; margin-top: 100px;">
        <h2 style="text-align: center;">Beta Access</h2>
        <main class="report-container" style="max-width: 400px; margin-top: 100px;">
    <h2 style="text-align: center;">Beta Access</h2>
    <p style="text-align: center; margin-bottom: 20px;">Please sign in or create an account to continue.</p>
    
    <form id="betaLoginForm" class="beta-form">
        <div class="form-group">
            <label for="betaUser">Username:</label>
            <input type="text" id="betaUser" required placeholder="Enter username">
        </div>

        <div class="form-group">
            <label for="betaPass">Password:</label>
            <input type="password" id="betaPass" required placeholder="Enter password">
        </div>

        <div class="form-group" style="flex-direction: row; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="rememberMe" style="width: auto;">
            <label for="rememberMe" style="margin: 0; font-weight: 400; color: #555;">Remember Me</label>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            <button type="submit" class="btn-game" style="width: 100%;">Sign In 🔐</button>
            
            <div style="text-align: center; font-size: 0.9rem; color: #666; margin: 5px 0;">— OR —</div>
            
            <a href="beta-signup.html" class="btn-primary" style="text-align: center; text-decoration: none; display: block; background-color: var(--action-teal);">
                Create New Account 🚀
            </a>
        </div>
        
        <p id="loginError" style="display:none; color: red; font-weight:600; text-align:center; margin-top:15px;">
            Incorrect username or password.
        </p>
    </form>
</main>
        </form>
    </main>

    <script>
        document.getElementById('betaLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userInput = document.getElementById('betaUser').value;
            const passInput = document.getElementById('betaPass').value;
            const remember = document.getElementById('rememberMe').checked;
            
            // 1. Check our "Database"
            let users = JSON.parse(localStorage.getItem('betaUsers')) || [];
            
            // 2. Also keep the master "student" account working
            const isMaster = (userInput === "student" && passInput === "climate2026");
            const isUser = users.find(u => u.username === userInput && u.password === passInput);

            if (isMaster || isUser) {
                if (remember) {
                    localStorage.setItem('betaLoggedIn', 'true'); 
                } else {
                    sessionStorage.setItem('betaLoggedIn', 'true'); 
                }
                window.location.href = "beta-test.html";
            } else {
                document.getElementById('loginError').style.display = "block";
            }
        });
    </script>
</body>
</html>
