<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Climate Change Club</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="report-container" style="max-width: 400px; margin-top: 80px;">
        <h2 style="text-align: center;">Create Beta Account</h2>
        <form id="pureSignupForm" class="beta-form">
            <div class="form-group">
                <label for="newSubUser">Username:</label>
                <input type="text" id="newSubUser" required placeholder="Pick a username">
            </div>
            <div class="form-group">
                <label for="newSubPass">Password:</label>
                <input type="password" id="newSubPass" required placeholder="Pick a password">
            </div>
            <button type="submit" id="signupBtn" class="btn-game" style="width: 100%;">Create Account 🚀</button>
            <p id="statusMsg" style="text-align:center; margin-top:15px; display:none;"></p>
        </form>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbym476k1A-i-yoX-1QhnIzuT4wwsQ10ykWUEJfKoqc7ebZm7ChB32EmN9WCWNJZjVg/exec";

        document.getElementById('pureSignupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('newSubUser').value;
            const pass = document.getElementById('newSubPass').value;
            const btn = document.getElementById('signupBtn');
            const status = document.getElementById('statusMsg');

            // 1. UI Feedback
            btn.innerHTML = "Creating... ⏳";
            btn.disabled = true;
            status.style.display = "block";
            status.style.color = "gray";
            status.innerText = "Connecting to server...";

            // 2. The Request
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // This prevents the 'CORS' error on some browsers
                body: JSON.stringify({ 
                    action: "signup", 
                    username: user, 
                    password: pass 
                })
            })
            .then(() => {
                // Note: with 'no-cors', we can't read the JSON response, 
                // but if the fetch finishes, it usually means it hit the script.
                status.style.color = "green";
                status.innerText = "Account Created! Redirecting...";
                
                setTimeout(() => {
                    window.location.href = "beta-login.html";
                }, 1500);
            })
            .catch(err => {
                console.error("Signup Error:", err);
                status.style.color = "red";
                status.innerText = "Error: Could not connect to database.";
                btn.innerHTML = "Create Account 🚀";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
